<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Science PYQ Quiz (Pro)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: #f3f4f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; color: #1f2937; }
        .quiz-container { background-color: #ffffff; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); width: 100%; max-width: 600px; overflow: hidden; position: relative; }
        .progress-container { width: 100%; background-color: #e5e7eb; height: 6px; position: absolute; top: 0; left: 0; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, #4f46e5, #7c3aed); width: 0%; transition: width 0.4s ease; }
        .quiz-header { padding: 40px 30px 20px; text-align: center; border-bottom: 1px solid #f3f4f6; }
        .quiz-header h2 { font-size: 1.4rem; font-weight: 700; color: #111827; margin-bottom: 8px; }
        .tracker { font-size: 0.9rem; color: #6b7280; font-weight: 600; }
        .quiz-body { padding: 30px; }
        h2.question-text { font-size: 1.15rem; font-weight: 600; margin-bottom: 25px; line-height: 1.5; color: #374151; }
        ul.options-list { list-style-type: none; }
        ul.options-list li { margin-bottom: 12px; }
        .option-label { display: flex; align-items: center; background-color: #f9fafb; border: 2px solid #e5e7eb; padding: 15px 20px; border-radius: 12px; cursor: pointer; transition: all 0.2s ease; font-size: 1rem; font-weight: 400; }
        .option-label:hover { background-color: #f3f4f6; border-color: #d1d5db; }
        input[type="radio"]:checked + span { font-weight: 600; color: #4f46e5; }
        .option-label:has(input[type="radio"]:checked) { border-color: #4f46e5; background-color: #eef2ff; }
        input[type="radio"] { margin-right: 15px; accent-color: #4f46e5; transform: scale(1.3); cursor: pointer; }
        .submit-btn { background: linear-gradient(135deg, #4f46e5, #6366f1); color: #fff; border: none; display: block; width: calc(100% - 60px); margin: 0 auto 30px; cursor: pointer; font-size: 1.1rem; font-weight: 600; padding: 16px; border-radius: 12px; transition: transform 0.2s, box-shadow 0.2s; box-shadow: 0 4px 14px rgba(79, 70, 229, 0.4); }
        .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(79, 70, 229, 0.5); }
        .result-container { text-align: center; display: none; padding: 40px 30px; }
        .result-container h2 { font-size: 1.8rem; color: #111827; margin-bottom: 10px; }
        .result-container p { font-size: 1.1rem; color: #6b7280; margin-bottom: 30px; }
        .reload-btn { background-color: #10b981; color: #fff; border: none; padding: 15px 30px; border-radius: 12px; cursor: pointer; font-size: 1.1rem; font-weight: 600; box-shadow: 0 4px 14px rgba(16, 185, 129, 0.3); }
    </style>
</head>
<body>
    <div class="quiz-container" id="quiz-container">
        <div class="progress-container"><div class="progress-bar" id="progress-bar"></div></div>
        <div class="quiz-header" id="quiz-header">
            <h2 id="header-title">Science PYQ Quiz</h2>
            <p class="tracker" id="question-tracker">Question 1 of 20</p>
        </div>
        <div class="quiz-body" id="quiz">
            <h2 class="question-text" id="question">Question text goes here</h2>
            <ul class="options-list">
                <li><label class="option-label" for="a"><input type="radio" name="answer" id="a" class="answer"><span id="a_text">Option A</span></label></li>
                <li><label class="option-label" for="b"><input type="radio" name="answer" id="b" class="answer"><span id="b_text">Option B</span></label></li>
                <li><label class="option-label" for="c"><input type="radio" name="answer" id="c" class="answer"><span id="c_text">Option C</span></label></li>
                <li><label class="option-label" for="d"><input type="radio" name="answer" id="d" class="answer"><span id="d_text">Option D</span></label></li>
            </ul>
        </div>
        <div class="result-container" id="result">
            <h2>Quiz Completed! 🎉</h2>
            <p id="score-text"></p>
            <button class="reload-btn" onclick="location.reload()">Restart Quiz</button>
        </div>
        <button class="submit-btn" id="submit">Next Question</button>
    </div>

    <script>
        const quizData = [
            { question: "Which instrument measures Atmospheric Pressure?", a: "Altimeter", b: "Barometer", c: "Anemometer", d: "Hygrometer", correct: "b" },
            { question: "What does a Lactometer measure?", a: "Humidity", b: "Ocean Depth", c: "Purity of Milk", d: "Wind Speed", correct: "c" },
            { question: "What is the SI unit of Work?", a: "Watt", b: "Newton", c: "Joule", d: "Pascal", correct: "c" },
            { question: "1 Horsepower (HP) is equal to:", a: "1000 W", b: "500 W", c: "746 W", d: "3600 W", correct: "c" },
            { question: "How many bones are there in an adult human body?", a: "206", b: "270", c: "300", d: "126", correct: "a" },
            { question: "Which is the longest bone in the human body?", a: "Humerus", b: "Femur", c: "Tibia", d: "Radius", correct: "b" },
            { question: "Acids turn blue litmus to:", a: "Green", b: "Yellow", c: "Red", d: "No change", correct: "c" },
            { question: "Which acid is present in our stomach for digestion?", a: "Sulphuric acid", b: "Hydrochloric acid", c: "Nitric acid", d: "Lactic acid", correct: "b" },
            { question: "Deficiency of Vitamin A causes:", a: "Rickets", b: "Scurvy", c: "Night Blindness", d: "Beriberi", correct: "c" },
            { question: "Ascorbic Acid is the scientific name of:", a: "Vitamin B1", b: "Vitamin C", c: "Vitamin D", d: "Vitamin E", correct: "b" },
            { question: "Bases produce which ions in water?", a: "H+ ions", b: "OH- ions", c: "Na+ ions", d: "Cl- ions", correct: "b" },
            { question: "What is the pH of basic substances?", a: "Less than 7", b: "Exactly 7", c: "Greater than 7", d: "0", correct: "c" },
            { question: "Formula of Baking Soda is:", a: "NaCl", b: "Na2CO3", c: "NaHCO3", d: "CaSO4", correct: "c" },
            { question: "Plaster of Paris (POP) is obtained by heating:", a: "Common salt", b: "Limestone", c: "Gypsum", d: "Marble", correct: "c" },
            { question: "What is the SI unit of Force?", a: "Joule", b: "Watt", c: "Newton", d: "Pascal", correct: "c" },
            { question: "Which law is known as the Law of Inertia?", a: "Newton's First Law", b: "Second Law", c: "Third Law", d: "Gravitation Law", correct: "a" },
            { question: "Which friction is the minimum?", a: "Static friction", b: "Sliding friction", c: "Rolling friction", d: "Limiting friction", correct: "c" },
            { question: "Which is the hottest planet in the solar system?", a: "Mercury", b: "Venus", c: "Mars", d: "Jupiter", correct: "b" },
            { question: "Which planet is known as the 'Red Planet'?", a: "Venus", b: "Jupiter", c: "Mars", d: "Saturn", correct: "c" },
            { question: "The Asteroid belt lies between which two planets?", a: "Earth and Mars", b: "Mars and Jupiter", c: "Jupiter and Saturn", d: "Venus and Earth", correct: "b" }
        ];

        const quiz = document.getElementById('quiz'), resultContainer = document.getElementById('result');
        const answerEls = document.querySelectorAll('.answer'), questionEl = document.getElementById('question');
        const a_text = document.getElementById('a_text'), b_text = document.getElementById('b_text');
        const c_text = document.getElementById('c_text'), d_text = document.getElementById('d_text');
        const submitBtn = document.getElementById('submit'), tracker = document.getElementById('question-tracker');
        const scoreText = document.getElementById('score-text'), progressBar = document.getElementById('progress-bar');
        const quizHeader = document.getElementById('quiz-header');

        let currentQuiz = 0, score = 0;
        loadQuiz();

        function loadQuiz() {
            deselectAnswers();
            const currentQuizData = quizData[currentQuiz];
            tracker.innerText = `Question ${currentQuiz + 1} of ${quizData.length}`;
            progressBar.style.width = `${(currentQuiz / quizData.length) * 100}%`;
            questionEl.innerText = currentQuizData.question;
            a_text.innerText = currentQuizData.a; b_text.innerText = currentQuizData.b;
            c_text.innerText = currentQuizData.c; d_text.innerText = currentQuizData.d;
        }

        function deselectAnswers() { answerEls.forEach(el => el.checked = false); }
        function getSelected() { let ans; answerEls.forEach(el => { if(el.checked) ans = el.id; }); return ans; }

        submitBtn.addEventListener('click', () => {
            const answer = getSelected();
            if(answer) {
                if(answer === quizData[currentQuiz].correct) score++;
                currentQuiz++;
                if(currentQuiz < quizData.length) { loadQuiz(); } 
                else {
                    quiz.style.display = 'none'; quizHeader.style.display = 'none'; submitBtn.style.display = 'none';
                    progressBar.style.width = '100%'; resultContainer.style.display = 'block';
                    scoreText.innerHTML = `You answered correctly at <strong>${score}/${quizData.length}</strong> questions!`;
                }
            } else alert("Please select an option!");
        });
    </script>
</body>
</html>
