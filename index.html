<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Mega Science PYQ Quiz</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .quiz-container {
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 600px;
            overflow: hidden;
        }

        .quiz-header {
            background-color: #1a237e;
            color: #fff;
            padding: 20px;
            text-align: center;
        }

        .quiz-body {
            padding: 30px;
        }

        h2.question-text {
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: #333;
        }

        ul.options-list {
            list-style-type: none;
        }

        ul.options-list li {
            margin-bottom: 10px;
        }

        .option-label {
            display: block;
            background-color: #e8eaf6;
            padding: 12px 15px;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            font-size: 1rem;
        }

        .option-label:hover {
            background-color: #c5cae9;
        }

        input[type="radio"] {
            margin-right: 10px;
            transform: scale(1.2);
        }

        .submit-btn {
            background-color: #ffb300;
            color: #fff;
            border: none;
            display: block;
            width: 100%;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: 600;
            padding: 15px;
            margin-top: 20px;
            border-radius: 5px;
            transition: background-color 0.3s;
        }

        .submit-btn:hover {
            background-color: #ff8f00;
        }

        .result-container {
            text-align: center;
            display: none;
        }

        .result-container h2 {
            font-size: 1.5rem;
            color: #1a237e;
            margin-bottom: 15px;
        }

        .reload-btn {
            background-color: #4caf50;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 10px;
        }

        .reload-btn:hover {
            background-color: #388e3c;
        }
    </style>
</head>

    <div class="quiz-container" id="quiz-container">

                </li>
                <li>

                        <input type="radio" name="answer" id="b" class="answer">

                </li>
                <li>
                    <label class="option-label" for="c">

                    </label>
                </li>

                        <input type="radio" name="answer" id="d" class="answer">
                        <span id="d_text">Option D</span>

            </ul>
        </div>
        
        <div class="quiz-body result-container" id="result">

            <button class="reload-btn" onclick="location.reload()">Restart Quiz</button>
        </div>

        <button class="submit-btn" id="submit">Next Question</button>
    </div>
